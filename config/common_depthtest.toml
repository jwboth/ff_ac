#source = "\\\\klient.uib.no\\FELLES\\LAB-IT\\IFT\\resfys\\FluidFlower\\FF2 24-25 glass beads\\050825_glass_beads_1_150_s"

[video]

[video.source]
folder = "segmentation/final_jpg" # relative to [data.results] when not absolute
#folder = "mass/final_jpg" # relative to [data.results] when not absolute
#folder = "cropping" # relative to [data.results] when not absolute
#extensions = [".jpg"]
recursive = false
sorting = "name"

[video.output]
formats = ["mp4"]
fps = 6.0
codec = "mp4v"
quality = 100
# resolution = [1280, 720] # optional [width, height]

[video.overlay]
show_elapsed_time = false
elapsed_time_format = "Elapsed: {:.2f} h"
show_note = true
note = "FluidFlower AC"
font_scale = 0.5
thickness = 2
text_color = [255, 255, 255]
position = [20, 20]
box_enabled = true
box_color = [0, 0, 0]
box_alpha = 0.4
box_padding = 10